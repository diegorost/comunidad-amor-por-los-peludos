name: Database backup

on:
  schedule:
    - cron: "0 0,8,16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dump D1 database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          mkdir -p backups
          npx wrangler d1 export comunidad-amor-db --remote --output="backups/$(date -u +%Y%m%d-%H%M).sql"

      - name: Keep only the 3 most recent backups
        run: |
          cd backups
          ls -1t *.sql | tail -n +4 | xargs -r rm --

      - name: Commit backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --cached --quiet || git commit -m "Database backup"
          git push
